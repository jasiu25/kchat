services:
  database:
    build: ./database
    volumes:
      - database-data:/var/lib/postgresql
    env_file:
      - ./database/.env
    ports:
      - 5432:5432

  server:
    build: ./server
    env_file:
      - ./server/.env
    depends_on:
      - database
    ports:
      - 3000:3000

  frontend:
    build: ./frontend
    depends_on:
      - server
    volumes:
      - /mnt/dane/dev/Web/kchat/frontend:/app
    ports:
      - 5173:5173

volumes:
  database-data: